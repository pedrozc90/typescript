services:
    db:
        image: postgres:18-alpine
        container_name: postgres
        hostname: postgres
        restart: unless-stopped
        ports:
            - "5432:5432"
        environment:
            POSTGRES_DB: typescript
            POSTGRES_USER: postgres
            POSTGRES_PASSWORD: postgres
            POSTGRES_INITDB_ARGS: "--data-checksums"
        volumes:
            - postgres_data:/var/lib/postgresql
            - $PWD/.postgres/postgres.conf:/etc/postgresql/postgresql.conf:ro # configuration file
            - $PWD/.postgres/init.sql:/docker-entrypoint-initdb.d/init.sql:ro # initialization script
        networks:
            - default
        healthcheck:
            test: [ "CMD-SHELL", "pg_isready --username postgres --dbname postgres" ]
        command: [ "postgres", "-c", "config_file=/etc/postgresql/postgresql.conf" ]

volumes:
    postgres_data:
        name: postgres_data
        driver: local

networks:
    typescript_network:
        name: typescript_network
        driver: bridge
